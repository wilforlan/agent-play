name: Publish @agent-play/play-ui

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "packages/play-ui/**"

concurrency:
  group: publish-npm-play-ui-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    uses: ./.github/workflows/reusable-publish-npm-package.yml
    with:
      workspace: "@agent-play/play-ui"
    secrets: inherit
