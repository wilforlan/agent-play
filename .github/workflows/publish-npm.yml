name: Publish npm packages

on:
  workflow_dispatch:
    inputs:
      publish_sdk:
        type: boolean
        description: Publish @agent-play/sdk
        default: true
      publish_cli:
        type: boolean
        description: Publish @agent-play/cli
        default: true
      publish_play_ui:
        type: boolean
        description: Publish @agent-play/play-ui
        default: true
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      sdk: ${{ steps.pick.outputs.sdk }}
      cli: ${{ steps.pick.outputs.cli }}
      play_ui: ${{ steps.pick.outputs.play_ui }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            sdk:
              - 'packages/sdk/**'
            cli:
              - 'packages/cli/**'
            play_ui:
              - 'packages/play-ui/**'
      - id: pick
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "sdk=${{ github.event.inputs.publish_sdk }}" >> $GITHUB_OUTPUT
            echo "cli=${{ github.event.inputs.publish_cli }}" >> $GITHUB_OUTPUT
            echo "play_ui=${{ github.event.inputs.publish_play_ui }}" >> $GITHUB_OUTPUT
          else
            echo "sdk=${{ steps.filter.outputs.sdk }}" >> $GITHUB_OUTPUT
            echo "cli=${{ steps.filter.outputs.cli }}" >> $GITHUB_OUTPUT
            echo "play_ui=${{ steps.filter.outputs.play_ui }}" >> $GITHUB_OUTPUT
          fi

  publish:
    needs: changes
    if: |
      needs.changes.outputs.sdk == 'true' ||
      needs.changes.outputs.cli == 'true' ||
      needs.changes.outputs.play_ui == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Install dependencies
        run: npm install

      - name: Build and publish @agent-play/sdk
        if: needs.changes.outputs.sdk == 'true'
        run: |
          npm run build -w @agent-play/sdk
          npm publish -w @agent-play/sdk --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build and publish @agent-play/cli
        if: needs.changes.outputs.cli == 'true'
        run: |
          npm run build -w @agent-play/cli
          npm publish -w @agent-play/cli --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build and publish @agent-play/play-ui
        if: needs.changes.outputs.play_ui == 'true'
        run: |
          npm run build -w @agent-play/play-ui
          npm publish -w @agent-play/play-ui --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
