name: Publish @agent-play/cli

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "packages/cli/**"

concurrency:
  group: publish-npm-cli-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    uses: ./.github/workflows/reusable-publish-npm-package.yml
    with:
      workspace: "@agent-play/cli"
    secrets: inherit
