apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: wilforlan-agent-play
resources:
  - namespace.yaml
  - redis.yaml
  - web-ui.yaml
commonLabels:
  app.kubernetes.io/part-of: wilforlan-agent-play
commonAnnotations:
  app.kubernetes.io/managed-by: kustomize
images:
  - name: agent-play-web-ui
    newName: ghcr.io/wilforlan/agent-play-web-ui
    newTag: "888410e"
# Private GHCR package (403 anonymous token): run ./k8s/create-ghcr-pull-secret.sh then uncomment:
patches:
  - path: patches/web-ui-ghcr-pull.yaml
