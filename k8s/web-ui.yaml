apiVersion: v1
kind: ConfigMap
metadata:
  name: wilforlan-agent-play-config
  labels:
    app.kubernetes.io/name: wilforlan-agent-play
    app.kubernetes.io/component: config
data:
  PLAY_PREVIEW_BASE_URL: "http://127.0.0.1:8888"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wilforlan-agent-play-web-ui
  labels:
    app.kubernetes.io/name: wilforlan-agent-play
    app.kubernetes.io/component: web-ui
spec:
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  progressDeadlineSeconds: 600
  replicas: 1
  selector:
    matchLabels:
      app: wilforlan-agent-play-web-ui
  template:
    metadata:
      labels:
        app: wilforlan-agent-play-web-ui
        app.kubernetes.io/name: wilforlan-agent-play
        app.kubernetes.io/component: web-ui
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      initContainers:
        - name: wait-for-redis
          image: public.ecr.aws/docker/library/busybox:1.36
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 8Mi
            limits:
              cpu: 100m
              memory: 32Mi
          command:
            - sh
            - -c
            - "until nc -z wilforlan-agent-play-redis 6379; do sleep 1; done"
      containers:
        - name: web-ui
          image: agent-play-web-ui:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8888
          env:
            - name: PORT
              value: "8888"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: NODE_ENV
              value: production
            - name: REDIS_URL
              value: redis://wilforlan-agent-play-redis:6379
            - name: PLAY_PREVIEW_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: wilforlan-agent-play-config
                  key: PLAY_PREVIEW_BASE_URL
            - name: NEXT_PUBLIC_AGENT_PLAY_BASE
              value: /agent-play
            - name: NEXT_PUBLIC_PLAY_API_BASE
              value: /agent-play
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "500m"
              memory: 1024Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: wilforlan-agent-play-web-ui
  labels:
    app.kubernetes.io/name: wilforlan-agent-play
    app.kubernetes.io/component: web-ui
spec:
  type: ClusterIP
  selector:
    app: wilforlan-agent-play-web-ui
  ports:
    - name: http
      port: 8888
      targetPort: http
