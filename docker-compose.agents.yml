# Standalone agents service — mount CLI credentials.json (serverUrl must reach your main server).
# Requires `.root` in the build context (same as k8s/Dockerfile.agents).
#
#   cp ~/.agent-play/credentials.json ./agent-play-credentials.json
#   export AGENT_PLAY_WEB_UI_URL=https://your-server.example  # overrides credentials serverUrl for HTTP
#   docker compose -f docker-compose.agents.yml up --build
#
services:
  agents:
    build:
      context: .
      dockerfile: k8s/Dockerfile.agents
    ports:
      - "${AGENTS_PORT:-3100}:3100"
    environment:
      NODE_ENV: production
      HOME: /home/agentplay
      AGENT_PLAY_WEB_UI_URL: ${AGENT_PLAY_WEB_UI_URL:?Set to your main server URL reachable from this container}
      AGENT_PLAY_BUILTINS_HOST: "0.0.0.0"
      AGENT_PLAY_BUILTINS_PORT: "3100"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AGENT_PLAY_API_KEY: ${AGENT_PLAY_API_KEY:-}
      AGENT_PLAY_MAIN_NODE_ID: ${AGENT_PLAY_MAIN_NODE_ID:-}
    volumes:
      - ${AGENT_PLAY_CREDENTIALS_HOST_FILE:-./agent-play-credentials.json}:/home/agentplay/.agent-play/credentials.json:ro
    restart: unless-stopped
